<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Twin-Stick (custom engine)</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #12131a;
    touch-action: none; user-select: none; -webkit-user-select: none; }
  #view { display: block; width: 100vw; height: 100dvh; }
  #hud { position: fixed; top: calc(env(safe-area-inset-top, 0px) + 10px); left: 14px; right: 14px;
    display: flex; gap: 18px; color: #eef; font: 600 16px system-ui, sans-serif;
    pointer-events: none; text-shadow: 0 1px 3px #000; }
  #hud .banner { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 26px; letter-spacing: 1px; text-align: center; padding: 0 24px; }
  /* Fullscreen toggle — every game gets one. Top-right, thumb-sized, above the
     HUD; pointer-events on (the HUD itself is click-through). */
  #fs { position: fixed; z-index: 20; width: 44px; height: 44px; line-height: 44px;
    top: calc(env(safe-area-inset-top, 0px) + 8px);
    right: calc(env(safe-area-inset-right, 0px) + 10px);
    border: 0; border-radius: 12px; text-align: center; font-size: 20px;
    color: #eef; background: rgba(20, 22, 30, .55); -webkit-tap-highlight-color: transparent; }
</style>
</head>
<body>
  <canvas id="view"></canvas>
  <div id="hud"></div>
  <button id="fs" aria-label="Toggle fullscreen">⛶</button>
  <script>
    // Fullscreen button. requestFullscreen works natively in a browser and, in
    // the in-app WebView, via the host's onShowCustomView. stopPropagation keeps
    // the tap from also firing the twin-stick (input.js listens on window).
    (function () {
      var b = document.getElementById('fs'), d = document.documentElement;
      var on = function () { return document.fullscreenElement || document.webkitFullscreenElement; };
      b.addEventListener('pointerdown', function (e) { e.stopPropagation(); });
      b.addEventListener('click', function () {
        if (on()) (document.exitFullscreen || document.webkitExitFullscreen).call(document);
        else (d.requestFullscreen || d.webkitRequestFullscreen).call(d);
      });
      document.addEventListener('fullscreenchange', function () { b.textContent = on() ? '🗕' : '⛶'; });
      document.addEventListener('webkitfullscreenchange', function () { b.textContent = on() ? '🗕' : '⛶'; });
    })();
  </script>
  <script type="module">
    import { start } from './game/bootstrap.js';
    start(document.getElementById('view'));
  </script>
</body>
</html>
