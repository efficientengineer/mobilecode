<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Twin-Stick (custom engine)</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #12131a;
    touch-action: none; user-select: none; -webkit-user-select: none; }
  #view { display: block; width: 100vw; height: 100dvh; }
  #hud { position: fixed; top: calc(env(safe-area-inset-top, 0px) + 10px); left: 14px; right: 14px;
    display: flex; gap: 18px; color: #eef; font: 600 16px system-ui, sans-serif;
    pointer-events: none; text-shadow: 0 1px 3px #000; }
  #hud .banner { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 26px; letter-spacing: 1px; text-align: center; padding: 0 24px; }
</style>
</head>
<body>
  <canvas id="view"></canvas>
  <div id="hud"></div>
  <script type="module">
    import { start } from './game/bootstrap.js';
    start(document.getElementById('view'));
  </script>
</body>
</html>
