<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <link rel="stylesheet" href="style.css" />
  <title>Voice Agent</title>
</head>
<body>
  <!-- Floating controls -->
  <button id="actionsFab" class="fab" title="Actions">⋯</button>
  <button id="menuFab" class="fab" title="Menu">☰</button>
  <button id="usage" class="usagechip hidden" title="tokens this run — tap for detail"></button>

  <!-- Floating dropdown panels -->
  <div id="modelMenu" class="fabmenu hidden"></div>
  <div id="actionsMenu" class="fabmenu hidden"></div>
  <div id="chatActionsMenu" class="fabmenu hidden"></div>

  <div id="workspace">
    <div id="tabbar">
      <button id="filesBtn" title="Files"><span class="fb-ico">☰</span> Files</button>
      <div id="tabs"></div>
    </div>

    <div id="mainCol">
      <div id="editorEmpty">
        <div class="ee-title">No file open</div>
        <div class="ee-sub">Tap <b>☰ Files</b> to browse the project,<br>or tap 💬 to chat with the agent.</div>
      </div>
      <div id="editorPane" class="hidden"></div>
      <button id="edFindFab" class="hidden" title="Find &amp; replace">🔍</button>
    </div>
  </div>

  <!-- Explorer tree (opened from the ☰ Files button) -->
  <div id="treeBackdrop" class="hidden"></div>
  <div id="treeOverlay" class="hidden">
    <div id="githubBar">
      <button id="githubBtn" class="gh-toggle">GitHub <span class="gh-chev">▾</span></button>
      <div id="githubMenu" class="hidden">
        <button data-ghact="switchRepo">Switch repository</button>
        <button data-ghact="commit">Commit (AI message)</button>
        <button data-ghact="pull">Pull</button>
        <button data-ghact="push">Push</button>
        <button data-ghact="createPR">Merge → open PR</button>
      </div>
    </div>
    <div id="treeOverlay-head">
      <span>Explorer</span>
      <span class="to-actions">
        <button id="newFileBtn" class="txtbtn xs" title="New file">＋ New</button>
        <button id="explorerRefresh" class="txtbtn xs" title="Refresh files">⟳</button>
        <button id="treeClose" class="txtbtn xs" title="Close">✕</button>
      </span>
    </div>
    <div id="tree"></div>
  </div>

  <!-- Floating chat button (opens the agent drawer) -->
  <button id="chatFab" title="Agent chat"><span id="chatFabIcon">💬</span><span id="chatUnread" class="unread hidden"></span></button>

  <!-- Agent chat drawer (slides in from the right) -->
  <div id="chatBackdrop" class="hidden"></div>
  <aside id="chatDrawer">
    <div id="chatDrawer-head">
      <span class="cd-title">Agent</span>
      <span class="cd-head-actions">
        <button id="chatActionsBtn" class="txtbtn xs" title="Chat actions">⋯</button>
        <button id="chatDrawerClose" class="txtbtn xs" title="Close">✕</button>
      </span>
    </div>
    <div id="chatDrawer-models">
      <div class="modelcol">
        <label class="model-label">Orchestrator</label>
        <button id="modelLead" class="modelbtn"><span id="modelName">…</span> ▾</button>
      </div>
      <div class="modelcol">
        <label class="model-label">Implementer</label>
        <button id="modelImpl" class="modelbtn"><span id="implName">…</span> ▾</button>
      </div>
    </div>
    <div id="chatDrawer-balance"><span class="db-label">DeepSeek balance</span><span id="balance" class="balmini">—</span></div>

    <main id="chat"></main>

    <div id="todos" class="hidden">
      <div id="todos-head">
        <span id="todos-now"></span>
        <span id="todos-count"></span>
        <span id="todos-chev">▸</span>
      </div>
      <div id="todos-body"></div>
    </div>

    <div id="status"></div>

    <div id="runbar" class="hidden">
      <span id="runlabel">Working…</span>
      <div id="queueChips"></div>
      <button id="stopBtn" class="pill stop">Stop</button>
    </div>

    <div id="attachBar" class="hidden"></div>

    <footer id="composer">
      <textarea id="input" rows="1" placeholder="Type or dictate a task…"></textarea>
      <button id="askBtn" class="icon" title="Ask (not saved to context)">❓</button>
      <button id="sendBtn" class="pill">Send</button>
      <button id="micBtn" class="txtbtn">Speak</button>
    </footer>
  </aside>

  <!-- Slide-up menu -->
  <div id="menu" class="sheet hidden">
    <div class="sheet-inner">
      <div class="sheet-title">Menu</div>

      <div class="group-title">Project</div>
      <div class="grid">
        <button data-act="makeGame">🎮 Make a game</button>
        <button data-act="newProject">Blank project</button>
        <button data-act="sessions">Projects</button>
        <button data-act="models">Models</button>
        <button data-act="files">Files</button>
        <button data-act="guidelines">Guidelines</button>
        <button data-act="bestPractices">Best practices</button>
        <button data-act="contextFiles">Attach files</button>
        <button data-act="refreshMap">Refresh map</button>
        <button data-act="run">Run app</button>
        <button data-act="checkWeb">Check web</button>
      </div>

      <div class="group-title">Git</div>
      <div class="grid">
        <button data-act="diff">Diff</button>
        <button data-act="commit">Commit</button>
        <button data-act="push">Push</button>
        <button data-act="pull">Pull</button>
        <button data-act="revertLast">Revert last</button>
        <button data-act="autocommit">Autocommit: —</button>
        <button data-act="newRepo">New repo</button>
        <button data-act="switchRepo">Switch repo</button>
        <button data-act="forcePush">Force push</button>
      </div>

      <div class="group-title">Branch &amp; PR</div>
      <div class="grid">
        <button data-act="startBranch">Start branch</button>
        <button data-act="createPR">Open PR</button>
        <button data-act="prStatus">PR status</button>
        <button data-act="cloudBuild">Build in cloud</button>
        <button data-act="buildStatus">Build status</button>
        <button data-act="fixBuild">Fix CI build</button>
        <button data-act="watchPr">Watch PR</button>
      </div>

      <div class="group-title">Context</div>
      <div class="grid">
        <button data-act="viewContext">View</button>
        <button data-act="previewContext">Preview payload</button>
        <button data-act="trimContext">Trim</button>
        <button data-act="clearContext">Clear</button>
        <button data-act="compaction">Compaction</button>
        <button data-act="caveman">Caveman: —</button>
        <button data-act="effort">Effort: —</button>
        <button data-act="frugal">Frugal: —</button>
      </div>

      <div class="group-title">System</div>
      <div class="grid">
        <button data-act="balance">Balance</button>
        <button data-act="battery">Battery</button>
        <button data-act="speak">Speak replies: —</button>
        <button data-act="settings">Settings</button>
        <button data-act="updateApp">Update app</button>
      </div>

      <button class="close" data-close>Close</button>
    </div>
  </div>

  <!-- Generic modal -->
  <div id="modal" class="sheet hidden">
    <div class="sheet-inner">
      <div class="sheet-title" id="modalTitle"></div>
      <div id="modalBody"></div>
      <div class="modal-actions">
        <button class="pill ghost" data-close>Close</button>
        <button class="pill" id="modalOk" style="display:none">Save</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
