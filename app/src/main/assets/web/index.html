<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="editmode.css" />
  <title>Voice Agent</title>
</head>
<body>
  <!-- Floating controls -->
  <button id="githubFab" class="fab" title="GitHub">GitHub ▸</button>
  <button id="menuFab" class="fab" title="Menu">☰</button>
  <button id="editModeFab" class="fab edit-mode-toggle" title="Edit layout">✎</button>

  <!-- Floating dropdown panels -->
  <div id="modelMenu" class="fabmenu hidden"></div>
  <div id="chatActionsMenu" class="fabmenu hidden"></div>
  <div id="githubMenu" class="fabmenu hidden"></div>

  <div id="workspace">
    <div id="tabbar">
      <button id="filesBtn" title="Files"><span class="fb-ico">☰</span> Files</button>
      <div id="tabs"></div>
      <span id="cursorPos" class="cursor-pos"></span>
    </div>
    <div id="subtitle">
      <div class="sub-item"><span class="sub-label">Session</span><span id="subSession">…</span></div>
      <div class="sub-item"><span class="sub-label">Repo</span><span id="subRepo">no repo</span></div>
      <div class="sub-item"><span class="sub-label">Branch</span><span id="subBranch">?</span></div>
    </div>

    <div id="mainCol">
      <div id="editorEmpty">
        <div class="ee-head">📋 Action Log</div>
        <div id="actionLogInline" class="alp-inline"></div>
      </div>
      <div id="editorPane" class="hidden"></div>
      <button id="edDiffFab" class="hidden" title="Toggle diff (vs last commit)">±</button>
      <button id="edFindFab" class="hidden" title="Find &amp; replace">🔍</button>

      <!-- Preview pane inline (inside #workspace, below the editor) -->
      <div id="previewPane" class="hidden">
        <div id="previewHead">
          <span id="previewUrl">Preview</span>
          <span class="preview-actions">
            <button id="previewRefresh" class="txtbtn xs" title="Refresh">⟳</button>
            <button id="previewClose" class="txtbtn xs" title="Close preview">✕</button>
          </span>
        </div>
        <div id="previewBody"><div id="previewStatus" class="preview-empty">Server not running</div></div>
      </div>
    </div>
  </div>

  <!-- Explorer tree (opened from the ☰ Files button) -->
  <div id="treeBackdrop" class="hidden"></div>
  <div id="treeOverlay" class="hidden">
    <div id="treeOverlay-head">
      <span>Explorer</span>
      <span class="to-actions">
        <button id="newFileBtn" class="txtbtn xs" title="New file">＋ New</button>
        <button id="explorerRefresh" class="txtbtn xs" title="Refresh files">⟳</button>
        <button id="treeClose" class="txtbtn xs" title="Close">✕</button>
      </span>
    </div>
    <div id="tree"></div>
  </div>

  <!-- Preview fab (floating, near the other fabs) -->
  <button id="previewFab" class="fab hidden" title="Toggle preview" style="right:144px">🖥</button>

  <!-- Session panel toggle tab (fold-out from left edge, like Claude.ai) -->
  <button id="sessionTab" title="Sessions"><span id="sessionTabIcon">☰</span></button>

  <!-- Session panel (slides in from the left) -->
  <div id="sessionBackdrop" class="hidden"></div>
  <aside id="sessionPanel">
    <div id="sessionPanel-head">
      <span class="sp-title">Sessions</span>
      <span class="sp-head-actions">
        <button id="sessionRenameBtn" class="txtbtn xs" title="Rename checked">✎ Rename</button>
        <button id="sessionDeleteBtn" class="txtbtn xs danger" title="Delete checked">🗑 Delete</button>
        <button id="sessionNewBtn" class="txtbtn xs" title="New session">＋ New</button>
        <button id="sessionPanelClose" class="txtbtn xs" title="Close">✕</button>
      </span>
    </div>
    <div id="sessionPanel-search">
      <input id="sessionSearch" type="text" placeholder="Filter sessions…" autocomplete="off" />
    </div>
    <div id="sessionList"></div>
  </aside>

  <!-- Action log panel toggle tab (fold-out from right edge, like session panel on the left) -->
  <button id="actionLogTab" title="Action log"><span id="actionLogTabIcon">📋</span></button>

  <!-- Action log panel (slides in from the right) -->
  <div id="actionLogBackdrop" class="hidden"></div>
  <aside id="actionLogPanel">
    <div id="actionLogPanel-head">
      <span class="alp-title">Action Log</span>
      <span class="alp-head-actions">
        <button id="actionLogClearBtn" class="txtbtn xs" title="Clear log">🗑 Clear</button>
        <button id="actionLogPanelClose" class="txtbtn xs" title="Close">✕</button>
      </span>
    </div>
    <div id="actionLogList"></div>
  </aside>

  <!-- Floating chat button (opens the agent drawer) -->
  <button id="chatFab" title="Agent chat"><span id="chatFabIcon">💬</span><span id="chatUnread" class="unread hidden"></span></button>

  <!-- Agent chat drawer (slides in from the right) -->
  <div id="chatBackdrop" class="hidden"></div>
  <aside id="chatDrawer">
    <div id="chatDrawer-head">
      <span class="cd-title">Agent</span>
      <span class="cd-head-actions">
        <button id="chatClearCtxBtn" class="txtbtn xs" title="Clear context">Clear</button>
        <button id="chatPayloadBtn" class="txtbtn xs" title="Preview payload">Payload</button>
      </span>
    </div>
    <div id="chatDrawer-models">
      <button id="modelToggle" class="modeltoggle" title="Model selection">
        <span class="mt-label">Models</span>
        <span id="modelToggleSummary">…</span>
        <span class="mt-chev">▸</span>
      </button>
      <div id="modelPanel" class="modelpanel hidden">
        <div class="modelrow">
          <div class="modelcol">
            <label class="model-label">Orchestrator</label>
            <button id="modelLead" class="modelbtn"><span id="modelName">…</span> ▾</button>
          </div>
          <div class="modelcol effortcol">
            <label class="model-label">Effort</label>
            <select id="orchEffortSelect" class="effortselect">
              <option value="off">Off</option>
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
            </select>
          </div>
        </div>
        <div class="modelrow">
          <div class="modelcol">
            <label class="model-label">Implementer</label>
            <button id="modelImpl" class="modelbtn"><span id="implName">…</span> ▾</button>
          </div>
          <div class="modelcol effortcol">
            <label class="model-label">Effort</label>
            <select id="implEffortSelect" class="effortselect">
              <option value="off">Off</option>
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
            </select>
          </div>
        </div>
      </div>
    </div>
    <div id="chatDrawer-balance">
      <div class="bal-grid">
        <div class="bal-row bal-head"><span></span><span>DeepSeek</span><span>Anthropic</span><span>OpenAI</span></div>
        <div class="bal-row bal-avail"><span>Avail</span><span id="bal-ds">…</span><span id="bal-an">…</span><span id="bal-oa">…</span></div>
        <div class="bal-row bal-sess"><span>Session</span><span id="bal-ds-used">…</span><span id="bal-an-used">…</span><span id="bal-oa-used">…</span></div>
      </div>
    </div>
    <main id="chat"></main>

    <div id="todos" class="hidden">
      <div id="todos-head">
        <span id="todos-now"></span>
        <span id="todos-count"></span>
        <span id="todos-chev">▸</span>
      </div>
      <div id="todos-body"></div>
    </div>

    <div id="status"></div>

    <div id="runbar" class="hidden">
      <span id="runlabel">Working…</span>
      <button id="stopBtn" class="pill stop">Stop</button>
    </div>

    <div id="attachBar" class="hidden"></div>

    <!-- Floating message box: opened by Send/Speak, shared by typing + voice. -->
    <div id="composeBox" class="hidden">
      <button id="composeClose" title="Cancel">✕</button>
      <textarea id="input" rows="2" placeholder="Type or dictate a task…"></textarea>
    </div>

    <footer id="composer">
      <button id="ctxBtn" class="icon" title="Attach context">📎</button>
      <button id="askBtn" class="icon" title="Ask (not saved to context)">❓</button>
      <div class="c-grid">
        <button id="sendBtn" class="pill sm ghost">Type</button>
        <button id="micBtn" class="txtbtn">Speak</button>
        <button id="simpleSubmitBtn" class="pill sm simple-submit hidden">Simple ⏎</button>
        <button id="smartSubmitBtn" class="pill sm hidden">Smart ⏎</button>
      </div>
      <span class="c-spacer"></span>
    </footer>
  </aside>

  <div id="ctxMenu" class="fabmenu hidden"></div>

  <!-- Slide-up menu -->
  <div id="menu" class="sheet hidden">
    <div class="sheet-inner">
      <div class="sheet-title">Menu</div>

      <input id="menuSearch" type="text" placeholder="Search actions…" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" />
      <div id="menuResults" class="hidden"></div>

      <div id="menuDefault">
      <div class="grid">
        <button data-act="makeGame">🎮 Make a game</button>
        <button data-act="newSession">New session</button>
        <button data-act="sessions">Sessions</button>
        <button data-act="bestPractices">Best practices</button>
        <button data-act="guidelines">Guidelines</button>
        <button data-act="settings">Settings</button>
      </div>

      <button id="advToggle" class="adv-toggle">Advanced ▾</button>
      <div id="advSection" class="hidden">
        <div class="group-title">Project</div>
        <div class="grid">
          <button data-act="refreshMap">Refresh map</button>
          <button data-act="checkWeb">Check web</button>
        </div>

        <div class="group-title">Context</div>
        <div class="grid">
          <button data-act="trimContext">Trim context</button>
          <button data-act="compaction">Compaction</button>
        </div>

        <div class="group-title">Agent tests</div>
        <div class="grid">
          <button data-act="diagnoseRun">🔍 Diagnose run</button>
          <button data-act="runHistory">📊 Run history</button>
          <button data-act="judgeRun">⚖️ Judge run</button>
          <button data-act="runEvals">🧪 Run evals</button>
          <button data-act="autoDiagnose">Auto-diagnose: on</button>
          <button data-act="autoClean">Auto-clean after merge: on</button>
          <button data-act="codeReview">Code review: on</button>
          <button data-act="routing">Prompt routing: off</button>
        </div>

        <div class="group-title">System</div>
        <div class="grid">
          <button data-act="battery">Battery</button>
          <button data-act="updateApp">Update app</button>
        </div>
      </div>
      </div>

      <button class="close" data-close>Close</button>
    </div>
  </div>

  <!-- Generic modal -->
  <div id="modal" class="sheet hidden">
    <div class="sheet-inner">
      <div class="sheet-title" id="modalTitle"></div>
      <div id="modalBody"></div>
      <div class="modal-actions">
        <button class="pill ghost" data-close>Close</button>
        <button class="pill" id="modalOk" style="display:none">Save</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="editmode.js"></script>
</body>
</html>
